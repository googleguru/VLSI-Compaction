# Benchmark configuration
# Prerequisites are marked; missing collateral triggers skip logic.
#
# Verilog benchmarks are synthesized by Yosys then mapped to geometry.
# CIF benchmarks are used directly by the compaction backend.

benchmarks:
  # ── Synthetic demo layouts (always available) ─────────────────────────────
  demo_simple:
    path: data/demo/demo_simple.cif
    type: demo
    description: "Synthetic 5-cell demo layout"
    available: true
    skip_reason: null

  demo_complex:
    path: data/demo/demo_complex.cif
    type: demo
    description: "Synthetic 20-cell demo layout with routing"
    available: true
    skip_reason: null

  # ── ISCAS-85 Verilog benchmarks (Yosys → geometry) ───────────────────────
  iscas_c17:
    path: data/demo/iscas/c17.v
    type: iscas_verilog
    description: "ISCAS-85 c17 — 6 NAND gates, synthesized via Yosys"
    available: true
    skip_reason: null

  iscas_s27:
    path: data/demo/iscas/s27.v
    type: iscas_verilog
    description: "ISCAS-89 s27 sequential circuit — synthesized via Yosys"
    available: true
    skip_reason: null

  # ── IPSD layout benchmarks (require external collateral) ─────────────────
  ipsd_c17:
    path: data/benchmarks/ipsd/c17.cif
    type: ipsd
    description: "IPSD c17 (layout-ready CIF)"
    available: false
    skip_reason: >
      IPSD layout-ready CIF not publicly distributed. Place c17.cif under
      data/benchmarks/ipsd/ to enable.

  ipsd_c432:
    path: data/benchmarks/ipsd/c432.cif
    type: ipsd
    description: "IPSD c432"
    available: false
    skip_reason: >
      Place c432.cif under data/benchmarks/ipsd/ to enable.

  # ── ASAP7 technology benchmarks (require PDK) ─────────────────────────────
  asap7_inv_chain:
    path: data/benchmarks/asap7/inv_chain.cif
    type: asap7
    description: "ASAP7 inverter chain (extracted from PDK cell views)"
    available: false
    skip_reason: >
      ASAP7 7nm PDK (academic license) required. After obtaining, run
      scripts/convert_inputs.sh to extract and convert CIF views.
