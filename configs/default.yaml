# Default experiment configuration
# Rule-110 CA + Yosys + Cell-Based-Layout-Compaction framework

experiment:
  name: demo
  seed: 42
  output_dir: outputs

# ── Yosys synthesis front-end ─────────────────────────────────────────────────
synth:
  yosys_bin:    yosys          # path or name on PATH
  timeout:      300            # seconds
  liberty_path: null           # set to .lib path for technology mapping
  top_module:   null           # null = auto-detect
  out_dir:      outputs/netlists
  scripts_dir:  src/synth/scripts

# ── Geometry construction ─────────────────────────────────────────────────────
geometry:
  cell_templates:    data/synth/cell_templates.yaml
  overlap_tolerance: 0
  spacing_lambda:    1
  target_density:    0.65      # synthetic layout target occupancy

# ── Rule-110 CA planner ───────────────────────────────────────────────────────
ca:
  engine:              rule110   # rule110 | composite (legacy)
  grid_resolution:     10
  rule110_config:      configs/rule110.yaml
  rules_config:        configs/ca_rules.yaml   # legacy composite config

# ── Backend compaction ────────────────────────────────────────────────────────
backend:
  perl_script:      vendor/cellCompaction.pl
  default_iter:     5
  default_xshrf:    0.9
  default_yshrf:    0.9
  timeout_seconds:  300

benchmarks:
  config: configs/benchmarks.yaml

viz:
  dpi:              150
  figure_format:    png
  font_size:        10
  line_width:       1.0
  white_background: true

# ── Magic VLSI layout integration ────────────────────────────────────────────
layout:
  magic_bin:    magic          # path or name on PATH
  magic_tech:   scmos          # technology: scmos | sky130A | sky130B | gf180mcu
  magic_timeout: 120           # seconds per Magic invocation
  export_mag:   true           # write .mag files after compaction
  export_gds:   false          # write GDS2 files (requires Magic)
  drc_on_export: true          # run DRC when exporting .mag
  render_magic:  false         # render Magic-style PNG figures (slow)

report:
  auto_update_readme: true
  embed_figures:      true
