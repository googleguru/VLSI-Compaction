version: "3.9"

# Shared service definition via YAML anchor (replaces deprecated `extends`)
x-compaction-base: &compaction-base
  build:
    context: ..
    dockerfile: docker/Dockerfile
  image: vlsi-ca-compaction:latest
  volumes:
    - ../data:/app/data:ro
    - ../outputs:/app/outputs
    - ../vendor:/app/vendor:ro
    - ../configs:/app/configs:ro
  environment:
    - PYTHONPATH=/app
    - EXPERIMENT_NAME=${EXPERIMENT_NAME:-demo}
    - CA_CONFIG=${CA_CONFIG:-configs/ca_rules.yaml}
  restart: "no"

services:
  compaction:
    <<: *compaction-base
    container_name: ca_compaction
    command: full-run

  baseline:
    <<: *compaction-base
    container_name: ca_baseline
    command: baseline

  ablation:
    <<: *compaction-base
    container_name: ca_ablation
    command: ablation

  report:
    <<: *compaction-base
    container_name: ca_report
    command: report
