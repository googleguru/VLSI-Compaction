version: "3.9"

# Shared service definition via YAML anchor
x-compaction-base: &compaction-base
  build:
    context: ..
    dockerfile: docker/Dockerfile
  image: vlsi-rule110-compaction:latest
  volumes:
    - ../data:/app/data:ro
    - ../outputs:/app/outputs
    - ../vendor:/app/vendor:ro
    - ../configs:/app/configs:ro
  environment:
    - PYTHONPATH=/app
    - EXPERIMENT_NAME=${EXPERIMENT_NAME:-demo}
    - POLICY=${POLICY:-r110_alternating_adaptive}
    - RULE110_CONFIG=${RULE110_CONFIG:-configs/rule110.yaml}
    - CA_CONFIG=${CA_CONFIG:-configs/ca_rules.yaml}
  restart: "no"

services:
  compaction:
    <<: *compaction-base
    container_name: rule110_compaction
    command: full-run

  synth:
    <<: *compaction-base
    container_name: rule110_synth
    command: synth

  compact:
    <<: *compaction-base
    container_name: rule110_compact
    command: compact

  baseline:
    <<: *compaction-base
    container_name: rule110_baseline
    command: baseline

  ablation:
    <<: *compaction-base
    container_name: rule110_ablation
    command: ablation

  report:
    <<: *compaction-base
    container_name: rule110_report
    command: report
